version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: starclad-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
      - "${HTTPS_PORT:-3443}:3443"
    environment:
      NODE_ENV: production
      MASTER_PASSWORD: ${MASTER_PASSWORD}
      REDIS_URL: redis://redis:6379
      STARKNET_RPC_URL: ${STARKNET_RPC_URL}
      SWAP_CONTRACT_ADDRESS: ${SWAP_CONTRACT_ADDRESS}
      BRIDGE_CONTRACT_ADDRESS: ${BRIDGE_CONTRACT_ADDRESS}
      RELAYER_ADDRESS: ${RELAYER_ADDRESS}
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY}
      BTC_RPC_URL: ${BTC_RPC_URL}
      BTC_RPC_USER: ${BTC_RPC_USER}
      BTC_RPC_PASS: ${BTC_RPC_PASS}
      PORT: 3000
      HTTPS_PORT: 3443
      ENABLE_HTTPS: ${ENABLE_HTTPS:-false}
      MAX_RPM: ${MAX_RPM:-100}
      REQUIRE_API_KEY: ${REQUIRE_API_KEY:-false}
      ENABLE_STARKNET: ${ENABLE_STARKNET:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./secure:/app/secure
      - ./certs:/app/certs:ro
    networks:
      - starclad
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: starclad-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - starclad
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  starclad:
    driver: bridge

volumes:
  redis-data:
    driver: local
